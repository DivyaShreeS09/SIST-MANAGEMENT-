{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OD - Class Coordinator</title>
  <link rel="stylesheet" href="{% static 'css/theme.css' %}" />
  <script src="{% static 'js/app.js' %}?v=99"></script>
  <script src="{% static 'js/common.js' %}?v=99"></script>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <img src="{% static 'assets/logo.png' %}" alt="Logo">
        <div class="title">
          <b>SIST MANAGEMENT SYSTEM</b>
          <span>OD Approval - Class Coordinator</span>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-ghost" data-theme-toggle onclick="toggleTheme()">Dark mode</button>
        <span class="pill" id="who"></span>
        <button class="btn btn-primary" onclick="signOut()">Sign Out</button>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="card">
      <h2>OD Approval Dashboard</h2>

      <div class="grid-2">
        <div>
          <label>Filter by Program</label>
          <input id="fProgram" placeholder="e.g., B.E CSE AIML">
        </div>
        <div>
          <label>Filter by Section</label>
          <input id="fSection" placeholder="e.g., A2">
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Filter by Year</label>
          <input id="fYear" placeholder="e.g., 1">
        </div>
        <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
          <button class="btn btn-ghost" id="applyBtn" type="button">Apply</button>
          <div><label>Export From</label><input type="date" id="fFromDate"></div>
          <div><label>Export To</label><input type="date" id="fToDate"></div>
          <button class="btn btn-primary" id="exportBtn" type="button">Export Approved List (PDF)</button>
        </div>
      </div>

      <div class="hr"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Reg No</th>
              <th>Name</th>
              <th>Program</th>
              <th>Section</th>
              <th>Reason</th>
              <th>From</th>
              <th>To</th>
              <th>Proof</th>
              <th>CC</th>
              <th>YC</th>
              <th>HOD</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const user = requireAuth();
    if (!user) throw new Error("No authenticated user found.");

    updateThemeButtonText();

    const displayName = user.name || user.full_name || user.username || "Class Coordinator";
    document.getElementById("who").textContent = `CLASS COORDINATOR | ${displayName}`;

    if (user.role !== "CLASS_COORDINATOR") {
      alert("Unauthorized");
      window.location.href = "/login.html";
    }

    const bodyEl = document.getElementById("body");
    const fProgram = document.getElementById("fProgram");
    const fSection = document.getElementById("fSection");
    const fYear = document.getElementById("fYear");
    const applyBtn = document.getElementById("applyBtn");
    const exportBtn = document.getElementById("exportBtn");

    const assignments = Array.isArray(user.assignments) ? user.assignments.filter(a => a.role === "CLASS_COORDINATOR") : [];
    const allowedSections = Array.isArray(user.assigned_sections) ? user.assigned_sections : [];

    if (assignments.length > 0) {
      fProgram.value = assignments[0].program || "";
      fYear.value = assignments[0].year || "";
    }

    let odData = [];

    async function loadAndRender() {
      try {
        const res = await fetch("/api/od/all/?approver_id=" + user.id);
        const raw = await res.json();
        odData = raw.map(r => ({ ...r, proofUrl: r.proof_url || "" }));
      } catch (err) {
        console.error("Failed to load OD requests:", err);
        odData = [];
      }
      render();
    }

    function norm(val) {
      return String(val || "").trim().toLowerCase();
    }

    function isVisibleToCC(r) {
      return assignments.some(a =>
        norm(a.program) === norm(r.program) &&
        String(a.year) === String(r.year) &&
        norm(a.section) === norm(r.section)
      );
    }

    function matchesFilters(r) {
      const yp = norm(fProgram.value);
      const ys = norm(fSection.value);
      const yy = String(fYear.value || "").trim();

      const okP = !yp || norm(r.program).includes(yp);
      const okS = !ys || norm(r.section).includes(ys);
      const okY = !yy || String(r.year || "") === yy;

      return okP && okS && okY;
    }

    // Sort: pending + expiring soonest first, then pending later, then closed
    function sortByPriority(list) {
      return list.slice().sort((a, b) => {
        const aActive = (a.finalStatus || "PENDING") === "PENDING";
        const bActive = (b.finalStatus || "PENDING") === "PENDING";
        if (aActive && !bActive) return -1;
        if (!aActive && bActive) return 1;
        if (aActive && bActive) return (a.toDate || "").localeCompare(b.toDate || "");
        return 0;
      });
    }

    function render() {
      let list = sortByPriority(
        odData.filter(r => isVisibleToCC(r)).filter(r => matchesFilters(r))
      );

      bodyEl.innerHTML = list.length ? list.map(r => {
        const proofHtml = r.proofUrl
          ? `<a href="${r.proofUrl}" target="_blank" class="btn btn-ghost">View Proof</a>`
          : (r.proofName || "-");

        const actionHtml =
          (r.statusCC === "PENDING" && (r.statusHOD || "") !== "APPROVED" && deriveCCYC(r) !== "REJECTED")
            ? `
            <button class="btn btn-success" onclick="approveOD('${r.id}','APPROVED', this)">Approve</button>
<button class="btn btn-danger" onclick="approveOD('${r.id}','REJECTED', this)">Reject</button>
          `
            : `<span class="small">—</span>`;

        return `
        <tr>
          <td>${r.regNo || "-"}</td>
          <td>${r.studentName || "-"}</td>
          <td>${r.program || "-"}</td>
          <td>${r.section || "-"}</td>
          <td>${r.reason || "-"}</td>
          <td>${formatDT(r.fromDate, r.fromTime)}</td>
          <td>${formatDT(r.toDate, r.toTime)}</td>
          <td>${proofHtml}</td>
          <td>${badge(r.statusCC || "PENDING")}</td>
          <td>${badge(r.statusYC || "PENDING")}</td>
          <td>${badge(r.statusHOD || "PENDING")}</td>
          <td style="display:flex; gap:8px; flex-wrap:wrap;">${actionHtml}</td>
        </tr>
      `;
      }).join("") : `<tr><td colspan="12">No requests found for your assigned sections (${allowedSections.join(", ") || "none"}).</td></tr>`;
    }

    async function approveOD(requestId, action, btn) {

  if (btn.disabled) return;

  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = "Processing...";

  try {
    const res = await fetch("/api/od/cc-action/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        request_id: requestId,
        action: action,
        approver_id: currentUser().id
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Failed");
      btn.disabled = false;
      btn.textContent = originalText;
      return;
    }

    btn.textContent = "Done";
    btn.style.background = "green";

    await loadAndRender();

  } catch (err) {
    alert("Server error");
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

    applyBtn.onclick = render;

    exportBtn.onclick = () => {
      // Scope export to CC's assigned sections only
      const scopedData = odData.filter(r => isVisibleToCC(r));
      exportApprovedOD(scopedData, {
        fromDate: document.getElementById("fFromDate").value,
        toDate: document.getElementById("fToDate").value,
      });
    };

    loadAndRender();
  </script>
</body>

</html>
