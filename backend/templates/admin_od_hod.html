{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OD - HOD</title>
  <link rel="stylesheet" href="{% static 'css/theme.css' %}"/>
  <script src="{% static 'js/app.js' %}?v=99"></script>
  <script src="{% static 'js/common.js' %}?v=99"></script>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">
      <img src="{% static 'assets/logo.png' %}" alt="Logo">
      <div class="title">
        <b>SIST MANAGEMENT SYSTEM</b>
        <span>OD Approval - HOD</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" data-theme-toggle onclick="toggleTheme()">Dark mode</button>
      <span class="pill" id="who"></span>
      <button class="btn btn-primary" onclick="signOut()">Sign Out</button>
      <button class="btn btn-ghost" onclick="location.href='/admin_lab_hod.html'">Lab Approval</button>
    </div>
  </div>

  <div style="height:16px"></div>

  <div class="card">
    <h2>OD Approval Dashboard</h2>

    <div class="grid-2">
      <div>
        <label>Filter by Program</label>
        <input id="fProgram" placeholder="e.g., B.E CSE AIML">
      </div>
      <div>
        <label>Filter by Section</label>
        <input id="fSection" placeholder="e.g., A1/A2">
      </div>
    </div>

    <div class="form-row">
      <div>
        <label>Filter by Year</label>
        <input id="fYear" placeholder="e.g., 3">
      </div>
      <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <button class="btn btn-ghost" id="applyBtn" type="button">Apply</button>
        <div><label>Export From</label><input type="date" id="fFromDate"></div>
        <div><label>Export To</label><input type="date" id="fToDate"></div>
        <button class="btn btn-primary" id="exportBtn" type="button">Export Approved List (PDF)</button>
      </div>
    </div>

    <div class="hr"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Reg No</th>
            <th>Name</th>
            <th>Program</th>
            <th>Section</th>
            <th>Reason</th>
            <th>From</th>
            <th>To</th>
            <th>Proof</th>
            <th>CC</th>
            <th>YC</th>
            <th>CC/YC</th>
            <th>HOD</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const user = requireAuth();
  if (!user) {
    throw new Error("No authenticated user found.");
  }

  updateThemeButtonText();

  const displayName = user.name || user.full_name || user.username || "HOD";
  document.getElementById("who").textContent = `HOD | ${displayName}`;

  if (user.role !== "HOD") {
    alert("Unauthorized");
    location.href = "login.html";
  }

  const bodyEl = document.getElementById("body");
  const fProgram = document.getElementById("fProgram");
  const fSection = document.getElementById("fSection");
  const fYear = document.getElementById("fYear");
  const applyBtn = document.getElementById("applyBtn");
  const exportBtn = document.getElementById("exportBtn");

  let odData = [];

  async function loadAndRender() {
    try {
      const res = await fetch("/api/od/all/");
      const raw = await res.json();
      odData = raw.map(r => ({ ...r, proofUrl: r.proof_url || "" }));
    } catch (err) {
      console.error("Failed to load OD requests:", err);
      odData = [];
    }
    render();
  }

  function matchesFilters(r) {
    const yp = fProgram.value.trim().toLowerCase();
    const ys = fSection.value.trim().toLowerCase();
    const yy = fYear.value.trim();

    const okP = !yp || (r.program || "").toLowerCase().includes(yp);
    const okS = !ys || (r.section || "").toLowerCase().includes(ys);
    const okY = !yy || String(r.year || "") === String(yy);

    return okP && okS && okY;
  }

  function render() {
    let list = odData;
    list = list.filter(r => matchesFilters(r));

    bodyEl.innerHTML = list.length ? list.map(r => {
      const ccyc = deriveCCYC(r);
      const canAct = (ccyc === "APPROVED" && (r.statusHOD || "PENDING") === "PENDING");

      const proofHtml = r.proofUrl
        ? `<a href="${r.proofUrl}" target="_blank" class="btn btn-ghost">View Proof</a>`
        : (r.proofName || "-");

      let actionHtml = `<span class="small">Waiting for CC/YC</span>`;

      if (ccyc === "REJECTED") {
        actionHtml = `<span class="small">CC/YC rejected</span>`;
      } else if ((r.statusHOD || "PENDING") === "APPROVED") {
        actionHtml = `<span class="small">Final approved</span>`;
      } else if ((r.statusHOD || "PENDING") === "REJECTED") {
        actionHtml = `<span class="small">Rejected by HOD</span>`;
      } else if (canAct) {
        actionHtml = `
          <button class="btn btn-success" onclick="approveOD('${r.id}','APPROVED', this)">Approve</button>
<button class="btn btn-danger" onclick="approveOD('${r.id}','REJECTED', this)">Reject</button>
        `;
      }

      return `
        <tr>
          <td>${r.regNo || "-"}</td>
          <td>${r.studentName || "-"}</td>
          <td>${r.program || "-"}</td>
          <td>${r.section || "-"}</td>
          <td>${r.reason || "-"}</td>
          <td>${formatDT(r.fromDate, r.fromTime)}</td>
          <td>${formatDT(r.toDate, r.toTime)}</td>
          <td>${proofHtml}</td>
          <td>${badge(r.statusCC || "PENDING")}</td>
          <td>${badge(r.statusYC || "PENDING")}</td>
          <td>${badge(ccyc)}</td>
          <td>${badge(r.statusHOD || "PENDING")}</td>
          <td style="display:flex; gap:8px; flex-wrap:wrap;">${actionHtml}</td>
        </tr>
      `;
    }).join("") : `<tr><td colspan="13">No requests found.</td></tr>`;
  }

 async function approveOD(requestId, action, btn) {

  if (btn.disabled) return;

  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = "Processing...";

  try {
    const res = await fetch("/api/od/hod-action/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        request_id: requestId,
        action: action,
        approver_id: currentUser().id
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Failed");
      btn.disabled = false;
      btn.textContent = originalText;
      return;
    }

    btn.textContent = "Done";
    btn.style.background = "green";

    await loadAndRender();

  } catch (err) {
    alert("Server error");
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

  applyBtn.onclick = render;

  exportBtn.onclick = () => {
    exportApprovedOD(odData, {
      year: fYear.value.trim(),
      program: fProgram.value.trim(),
      section: fSection.value.trim(),
      fromDate: document.getElementById("fFromDate").value,
      toDate: document.getElementById("fToDate").value,
    });
  };

  loadAndRender();
</script>
</body>
</html>
