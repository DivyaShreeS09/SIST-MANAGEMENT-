{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - SIST Management</title>
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
<script src="{% static 'js/app.js' %}?v=99"></script>
<script src="{% static 'js/common.js' %}?v=99"></script>
  <style>
    body{
      background:
        linear-gradient(0deg, rgba(0,0,0,.20), rgba(0,0,0,.10)),
        url("{% static 'assets/scas.jpg' %}") center/cover no-repeat fixed;
    }
    [data-theme="light"] body{
      background:
        linear-gradient(0deg, rgba(255,255,255,.15), rgba(255,255,255,.08)),
        url("{% static 'assets/scas.jpg' %}") center/cover no-repeat fixed;
    }
    .login-wrap{
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 14px;
    }
    .login-card{
      width: min(520px, 92vw);
      border-radius: 28px;
      padding: 20px;
      background: rgba(10,12,16,.45);
      border: 1px solid rgba(255,77,0,.20);
      backdrop-filter: blur(16px);
      box-shadow: 0 25px 70px rgba(0,0,0,.40);
    }
    [data-theme="light"] .login-card{
      background: rgba(255,255,255,.40);
      border: 1px solid rgba(255,77,0,.18);
    }
    .login-head{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      padding: 8px 0 12px;
      text-align:center;
    }
    .login-head img{
      height: 60px;
      border-radius: 14px;
      object-fit:contain;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    .login-head h1{
      margin:0;
      font-size: 20px;
      letter-spacing: .8px;
      color: rgba(255,255,255,.95);
    }
    [data-theme="light"] .login-head h1{
      color:#111;
    }
    .login-head p{
      margin:0;
      font-size: 12px;
      color: rgba(255,255,255,.75);
      font-weight: 700;
      letter-spacing: .2px;
    }
    [data-theme="light"] .login-head p{
      color: rgba(0,0,0,.60);
    }
    .login-card label{
      color: rgba(255,255,255,.90);
    }
    [data-theme="light"] .login-card label{
      color: rgba(0,0,0,.60);
    }
    .rightTop{
      display:flex;
      justify-content:flex-end;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="rightTop">
        <button type="button" class="btn btn-ghost" data-theme-toggle onclick="toggleTheme()">Dark mode</button>
      </div>

      <div class="login-head">
        <img src="{% static 'assets/logo.png' %}" alt="Logo"/>
        <h1>SIST MANAGEMENT SYSTEM</h1>
        <p>Secure Access Portal</p>
      </div>

      <form id="loginForm">
        <label for="role">Login as</label>
        <select id="role" required>
          <option value="STUDENT">Student</option>
          <option value="CLASS_COORDINATOR">Class Coordinator</option>
          <option value="YEAR_COORDINATOR">Year Coordinator</option>
          <option value="HOD">HOD</option>
          <option value="WARDEN">Warden</option>
          <option value="CHIEF_WARDEN">Chief Warden</option>
          <option value="SECURITY">Security</option>
        </select>

        <label for="username">Username</label>
        <input id="username" placeholder="Enter username" required />

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" required />

        <div style="margin-top:14px;">
          <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
        </div>

        <div style="margin-top:10px; text-align:right;">
          <a href="/password-reset/" style="font-size:14px; color:#ff6b2c; font-weight:700; text-decoration:none;">
            Forgot Password?
          </a>
        </div>

        <div class="notice" id="msg" style="margin-top:14px; display:none;"></div>
      </form>

      <footer>Use your institutional credentials or reset your password via email.</footer>
    </div>
  </div>

<script>
  updateThemeButtonText();

  const loginForm = document.getElementById("loginForm");
  const roleEl = document.getElementById("role");
  const usernameEl = document.getElementById("username");
  const passwordEl = document.getElementById("password");
  const msgEl = document.getElementById("msg");

  function showMsg(text) {
    msgEl.style.display = "block";
    msgEl.textContent = text;
  }

  function clearMsg() {
    msgEl.style.display = "none";
    msgEl.textContent = "";
  }

  function storeSession(user) {
    localStorage.setItem("sist_session", JSON.stringify({
      userId: user.id
    }));
    localStorage.setItem("sist_current_user", JSON.stringify(user));
  }

  function redirectByRole(user) {
    if (user.role === "STUDENT") {
      window.location.href = "/student_dashboard.html/";
      return;
    }
    if (user.role === "CLASS_COORDINATOR") {
      window.location.href = "/admin_od_cc.html/";
      return;
    }
    if (user.role === "YEAR_COORDINATOR") {
      window.location.href = "/admin_od_yc.html/";
      return;
    }
    if (user.role === "HOD") {
      window.location.href = "/admin_od_hod.html/";
      return;
    }
    if (user.role === "CHIEF_WARDEN") {
      window.location.href = "/admin_hostel_chief.html/";
      return;
    }
    if (user.role === "WARDEN") {
      window.location.href = "/admin_hostel_warden.html/";
      return;
    }
    if (user.role === "SECURITY") {
      window.location.href = "/admin_hostel_security.html/";
      return;
    }

    alert("Unknown role. Contact admin.");
  }

  loginForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    clearMsg();

    const role = roleEl.value.trim();
    const username = usernameEl.value.trim();
    const password = passwordEl.value;

    if (!role || !username || !password) {
      showMsg("Please fill all fields.");
      return;
    }

    try {
      const res = await fetch("/api/login/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          role: role,
          username: username,
          password: password
        })
      });

      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || "Login failed.");
        return;
      }

      if (!data.user) {
        showMsg("User data missing from server response.");
        return;
      }

      storeSession(data.user);
      redirectByRole(data.user);

    } catch (err) {
      console.error(err);
      showMsg("Server error. Please try again.");
    }
  });
</script>
</body>
</html>
