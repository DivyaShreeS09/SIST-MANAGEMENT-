<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Set New Password</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f7fb;padding:40px}
    .card{max-width:480px;margin:auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    input{width:100%;padding:12px;margin:12px 0;border:1px solid #ccc;border-radius:10px}
    button{width:100%;padding:12px;background:#ff6b2c;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h2>Set New Password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Update Password</button>
    </form>
  </div>
</body>
</html>
