{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>OD Request - Student</title>
  <link rel="stylesheet" href="{% static 'css/theme.css' %}"/>
  <script src="{% static 'js/app.js' %}?v=99"></script>
  <script src="{% static 'js/common.js' %}?v=99"></script>">
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">
      <img src="{% static 'assets/logo.png' %}" alt="Logo">
      <div class="title">
        <b>SIST MANAGEMENT SYSTEM</b>
        <span>OD Request</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" data-theme-toggle onclick="toggleTheme()">Dark mode</button>
      <span class="pill" id="who"></span>
      <button class="btn btn-ghost" onclick="location.href='/student_dashboard.html'">Dashboard</button>
      <button class="btn btn-primary" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div style="height:16px"></div>

  <div class="card">
    <h2>OD Request</h2>

    <form id="odForm" enctype="multipart/form-data">
      <div class="grid-2">
        <div>
          <label for="regNo">Register No</label>
          <input id="regNo" required>
        </div>
        <div>
          <label for="studentName">Name</label>
          <input id="studentName" required>
        </div>
        <div>
          <label for="program">Program</label>
          <input id="program" required>
        </div>
        <div>
          <label for="section">Section</label>
          <input id="section" required>
        </div>
      </div>

      <label for="reason">Reason / Subject</label>
      <textarea id="reason" required placeholder="e.g., workshop / Technical Event / Hackathon"></textarea>

      <div class="form-row">
        <div>
          <label for="fromDate">From Date</label>
          <input type="date" id="fromDate" required>
        </div>
        <div>
          <label for="toDate">To Date</label>
          <input type="date" id="toDate" required>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="fromTime">From Time</label>
          <input type="time" id="fromTime" required>
        </div>
        <div>
          <label for="toTime">To Time</label>
          <input type="time" id="toTime" required>
        </div>
      </div>

      <label for="proof">Upload Proof (Letter / Invite / Approval)</label>
      <input type="file" id="proof" required>

      <div style="margin-top:14px;">
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Submit OD Request</button>
      </div>
    </form>

    <div class="hr"></div>

    <h2>Your OD History</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Reason</th>
            <th>From</th>
            <th>To</th>
            <th>CC</th>
            <th>YC</th>
            <th>HOD</th>
            <th>PDF</th>
          </tr>
        </thead>
        <tbody id="odBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const u = requireAuth();
  if (!u) {
    throw new Error("No authenticated user found.");
  }

  updateThemeButtonText();

  const displayName = u.name || u.full_name || u.username || "Student";
  const programValue = u.program || u.department || "";
  const sectionValue = u.section || "";
  const deptValue = u.dept || u.department || "";
  const yearValue = u.year || "";

  const whoEl = document.getElementById("who");
  const odFormEl = document.getElementById("odForm");
  const odBodyEl = document.getElementById("odBody");
  const submitBtnEl = document.getElementById("submitBtn");

  const regNoEl = document.getElementById("regNo");
  const studentNameEl = document.getElementById("studentName");
  const programEl = document.getElementById("program");
  const sectionEl = document.getElementById("section");
  const reasonEl = document.getElementById("reason");
  const fromDateEl = document.getElementById("fromDate");
  const toDateEl = document.getElementById("toDate");
  const fromTimeEl = document.getElementById("fromTime");
  const toTimeEl = document.getElementById("toTime");
  const proofEl = document.getElementById("proof");

  whoEl.textContent = `Logged in: ${displayName}`;

  regNoEl.value = u.username || u.register_no || "";
  studentNameEl.value = displayName;
  programEl.value = programValue;
  sectionEl.value = sectionValue;

  function safeAttr(obj) {
    return JSON.stringify(obj).replace(/"/g, '&quot;');
  }

  function renderODHistory() {
    const list = DB.od().filter(r => String(r.studentId) === String(u.id));

    if (!list.length) {
      odBodyEl.innerHTML = `<tr><td colspan="7">No OD requests yet.</td></tr>`;
      return;
    }

    odBodyEl.innerHTML = list.map(r => {
      const finalOk = deriveCCYC(r) === "APPROVED" && (r.statusHOD || "") === "APPROVED";

      return `
        <tr>
          <td>${r.reason || "-"}</td>
          <td>${formatDT(r.fromDate, r.fromTime)}</td>
          <td>${formatDT(r.toDate, r.toTime)}</td>
          <td>${badge(r.statusCC || "PENDING")}</td>
          <td>${badge(r.statusYC || "PENDING")}</td>
          <td>${badge(r.statusHOD || "PENDING")}</td>
          <td>
            ${
              finalOk
                ? `<button class="btn btn-ghost" onclick="downloadODLetter(${safeAttr(r)})">Download</button>`
                : `<span class="small">—</span>`
            }
          </td>
        </tr>
      `;
    }).join("");
  }

  renderODHistory();

  odFormEl.addEventListener("submit", async function (e) {
    e.preventDefault();

    const proofFile = proofEl.files[0];
    if (!proofFile) {
      alert("Proof file is required.");
      return;
    }

    const regNo = (regNoEl.value || "").trim();
    const studentName = (studentNameEl.value || "").trim();
    const program = (programEl.value || "").trim();
    const section = (sectionEl.value || "").trim();
    const reason = (reasonEl.value || "").trim();
    const fromDate = fromDateEl.value || "";
    const toDate = toDateEl.value || "";
    const fromTime = fromTimeEl.value || "";
    const toTime = toTimeEl.value || "";

    if (!regNo || !studentName || !program || !section || !reason || !fromDate || !toDate || !fromTime || !toTime) {
      alert("Please fill all required fields.");
      return;
    }

    submitBtnEl.disabled = true;
    submitBtnEl.textContent = "Submitting...";

    try {
      const formData = new FormData();
      formData.append("student_id", u.id);
      formData.append("reason", reason);
      formData.append("from_date", fromDate);
      formData.append("to_date", toDate);
      formData.append("from_time", fromTime);
      formData.append("to_time", toTime);
      formData.append("proof_file", proofFile);

      const res = await fetch("/api/od/request/", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "OD request submission failed.");
        return;
      }

      const odList = DB.od();
      odList.unshift({
        id: data.id,
        studentId: u.id,
        regNo: regNo,
        studentName: studentName,
        program: program,
        section: section,
        year: yearValue,
        dept: deptValue,
        reason: reason,
        fromDate: fromDate,
        toDate: toDate,
        fromTime: fromTime,
        toTime: toTime,
        proofName: data.proof_name || proofFile.name,
        proofUrl: data.proof_url || "",

        statusCC: "PENDING",
        ccBy: null,
        statusYC: "PENDING",
        ycBy: null,
        statusHOD: "PENDING",
        hodBy: null,

        timeline: [
          {
            at: new Date().toISOString(),
            by: displayName,
            action: "CREATED"
          }
        ]
      });

      DB.saveOD(odList);

      odFormEl.reset();
      regNoEl.value = u.username || u.register_no || "";
      studentNameEl.value = displayName;
      programEl.value = programValue;
      sectionEl.value = sectionValue;

      renderODHistory();
      alert("OD request submitted successfully.");

    } catch (err) {
      console.error(err);
      alert("Server error while submitting OD request.");
    } finally {
      submitBtnEl.disabled = false;
      submitBtnEl.textContent = "Submit OD Request";
    }
  });
</script>
</body>
</html>
