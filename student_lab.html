{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lab Access - Student</title>
  <link rel="stylesheet" href="{% static 'css/theme.css' %}"/>
  <script src="{% static 'js/app.js' %}"></script>
  <script src="{% static 'js/common.js' %}"></script>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">
      <img src="{% static 'assets/logo.png' %}" alt="Logo">
      <div class="title">
        <b>SIST MANAGEMENT SYSTEM</b>
        <span>Lab Access Request</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" data-theme-toggle onclick="toggleTheme()">Dark mode</button>
      <span class="pill" id="who"></span>
      <button class="btn btn-ghost" onclick="location.href='student_dashboard.html'">Dashboard</button>
      <button class="btn btn-primary" onclick="signOut()">Sign Out</button>
    </div>
  </div>

  <div style="height:16px"></div>

  <div class="card">
    <h2>Lab Access Request</h2>

    <form id="labForm">
      <div class="grid-2">
        <div>
          <label for="regNo">Register No</label>
          <input id="regNo" required>
        </div>
        <div>
          <label for="studentName">Name</label>
          <input id="studentName" required>
        </div>
        <div>
          <label for="program">Program</label>
          <input id="program" required>
        </div>
        <div>
          <label for="section">Section</label>
          <input id="section" required>
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label for="lab">Lab</label>
          <input id="lab" required placeholder="e.g., AI Lab - SCAS">
        </div>
        <div>
          <label for="reason">Reason</label>
          <input id="reason" required placeholder="e.g., Project / Assignment / Practical">
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="fromDate">From Date</label>
          <input type="date" id="fromDate" required>
        </div>
        <div>
          <label for="toDate">To Date</label>
          <input type="date" id="toDate" required>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="fromTime">From Time</label>
          <input type="time" id="fromTime" required>
        </div>
        <div>
          <label for="toTime">To Time</label>
          <input type="time" id="toTime" required>
        </div>
      </div>

      <label for="proof">Upload Proof (Letter / Approval / Instruction)</label>
      <input type="file" id="proof" required>

      <div style="margin-top:14px;">
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Submit Lab Request</button>
      </div>
    </form>

    <div class="hr"></div>

    <h2>Your Lab Access History</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Lab</th>
            <th>Reason</th>
            <th>From</th>
            <th>To</th>
            <th>Mentor</th>
            <th>HOD</th>
            <th>PDF</th>
          </tr>
        </thead>
        <tbody id="labBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const u = requireAuth();
  if (!u) {
    throw new Error("No authenticated user found.");
  }

  updateThemeButtonText();

  const displayName = u.name || u.full_name || u.username || "Student";
  const programValue = u.program || u.department || "";
  const sectionValue = u.section || "";
  const deptValue = u.dept || u.department || "";
  const yearValue = u.year || "";

  const whoEl = document.getElementById("who");
  const labFormEl = document.getElementById("labForm");
  const labBodyEl = document.getElementById("labBody");
  const submitBtnEl = document.getElementById("submitBtn");

  const regNoEl = document.getElementById("regNo");
  const studentNameEl = document.getElementById("studentName");
  const programEl = document.getElementById("program");
  const sectionEl = document.getElementById("section");
  const labEl = document.getElementById("lab");
  const reasonEl = document.getElementById("reason");
  const fromDateEl = document.getElementById("fromDate");
  const toDateEl = document.getElementById("toDate");
  const fromTimeEl = document.getElementById("fromTime");
  const toTimeEl = document.getElementById("toTime");
  const proofEl = document.getElementById("proof");

  whoEl.textContent = `Logged in: ${displayName}`;

  regNoEl.value = u.username || u.register_no || "";
  studentNameEl.value = displayName;
  programEl.value = programValue;
  sectionEl.value = sectionValue;

  function safeAttr(obj) {
    return JSON.stringify(obj).replace(/"/g, '&quot;');
  }

  function renderLabHistory() {
    const list = DB.lab().filter(r => String(r.studentId) === String(u.id));

    if (!list.length) {
      labBodyEl.innerHTML = `<tr><td colspan="7">No lab requests yet.</td></tr>`;
      return;
    }

    labBodyEl.innerHTML = list.map(r => {
      const finalOk = (r.statusMENTOR || "") === "APPROVED" && (r.statusHOD || "") === "APPROVED";

      return `
        <tr>
          <td>${r.lab || "-"}</td>
          <td>${r.reason || "-"}</td>
          <td>${formatDT(r.fromDate, r.fromTime)}</td>
          <td>${formatDT(r.toDate, r.toTime)}</td>
          <td>${badge(r.statusMENTOR || "PENDING")}</td>
          <td>${badge(r.statusHOD || "PENDING")}</td>
          <td>
            ${
              finalOk
                ? `<button class="btn btn-ghost" onclick="downloadLabLetter(${safeAttr(r)})">Download</button>`
                : `<span class="small">—</span>`
            }
          </td>
        </tr>
      `;
    }).join("");
  }

  renderLabHistory();

  labFormEl.addEventListener("submit", async function (e) {
    e.preventDefault();

    const proofFile = proofEl.files[0];
    if (!proofFile) {
      alert("Proof file is required.");
      return;
    }

    const regNo = (regNoEl.value || "").trim();
    const studentName = (studentNameEl.value || "").trim();
    const program = (programEl.value || "").trim();
    const section = (sectionEl.value || "").trim();
    const labName = (labEl.value || "").trim();
    const reason = (reasonEl.value || "").trim();
    const fromDate = fromDateEl.value || "";
    const toDate = toDateEl.value || "";
    const fromTime = fromTimeEl.value || "";
    const toTime = toTimeEl.value || "";

    if (!regNo || !studentName || !program || !section || !labName || !reason || !fromDate || !toDate || !fromTime || !toTime) {
      alert("Please fill all required fields.");
      return;
    }

    submitBtnEl.disabled = true;
    submitBtnEl.textContent = "Submitting...";

    try {
      const res = await fetch("/api/lab/request/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          student_id: u.id,
          lab: labName,
          reason: reason,
          from_date: fromDate,
          to_date: toDate,
          from_time: fromTime,
          to_time: toTime,
          proof_file: proofFile.name
        })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.error || "Lab request submission failed.");
        submitBtnEl.disabled = false;
        submitBtnEl.textContent = "Submit Lab Request";
        return;
      }

      // temporary local sync so student dashboard/history updates immediately
      const labReqList = DB.lab();

      labReqList.unshift({
        id: data.id || ("lab" + Date.now()),
        studentId: u.id,
        regNo: regNo,
        studentName: studentName,
        program: program,
        section: section,
        year: yearValue,
        dept: deptValue,
        lab: labName,
        reason: reason,
        fromDate: fromDate,
        toDate: toDate,
        fromTime: fromTime,
        toTime: toTime,
        proofName: proofFile.name,

        statusMENTOR: "PENDING",
        mentorBy: null,
        statusHOD: "PENDING",
        hodBy: null,
        timeline: [
          {
            at: new Date().toISOString(),
            by: displayName,
            action: "CREATED"
          }
        ]
      });

      DB.saveLab(labReqList);

      labFormEl.reset();

      regNoEl.value = u.username || u.register_no || "";
      studentNameEl.value = displayName;
      programEl.value = programValue;
      sectionEl.value = sectionValue;

      renderLabHistory();
      alert("Lab request submitted successfully.");

    } catch (err) {
      console.error(err);
      alert("Server error while submitting lab request.");
    } finally {
      submitBtnEl.disabled = false;
      submitBtnEl.textContent = "Submit Lab Request";
    }
  });
</script>
</body>
</html>
